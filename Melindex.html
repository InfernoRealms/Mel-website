<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimi | Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .art-card { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 25px; border-radius: 24px; transition: 0.3s; }
        .art-card:hover { border-color: #ec4899; }
        #chat-ui { position: fixed; bottom: 20px; left: 20px; width: 300px; background: #111; border: 1px solid #333; border-radius: 15px; display: none; flex-direction: column; z-index: 100; }
        #messages { height: 300px; overflow-y: auto; padding: 15px; font-size: 12px; display: flex; flex-direction: column; gap: 5px; }
        .melly { align-self: flex-start; background: #222; padding: 5px 10px; border-radius: 10px; }
        .client { align-self: flex-end; background: #ec4899; padding: 5px 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <h1 id="artistName" class="text-2xl font-black italic uppercase">Mimi</h1>
        <a id="discordLink" href="#" class="bg-[#5865F2] px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest">Discord</a>
    </nav>

    <div class="flex gap-10 justify-center mb-10 text-[10px] font-bold uppercase tracking-widest text-zinc-500">
        <span onclick="filter('PixelArt')" class="cursor-pointer hover:text-pink-500">Pixel Art</span>
        <span onclick="filter('DigitalArt')" class="cursor-pointer hover:text-pink-500">Digital Art</span>
        <span onclick="filter('Renders')" class="cursor-pointer hover:text-pink-500">Renders</span>
        <span onclick="filter('Skins')" class="cursor-pointer hover:text-pink-500">Skins</span>
    </div>

    <main id="priceGrid" class="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-3 gap-6 pb-20"></main>

    <button onclick="document.getElementById('chat-ui').style.display='flex'" class="fixed bottom-5 left-5 bg-pink-500 p-4 rounded-full font-bold text-xs">💬 CHAT</button>
    <a id="paypalLink" href="#" class="fixed bottom-5 right-5 bg-[#0070ba] p-4 rounded-full font-bold text-xs">💳 PAYPAL</a>

    <div id="chat-ui">
        <div class="p-3 border-b border-zinc-800 flex justify-between text-xs font-bold"><span>CHAT</span><button onclick="this.parentElement.parentElement.style.display='none'">X</button></div>
        <div id="messages"></div>
        <div class="p-2 border-t border-zinc-800 flex gap-1">
            <input type="text" id="chatInput" placeholder="Hi..." class="bg-black text-xs p-2 flex-1 outline-none">
            <button onclick="sendMsg()" class="bg-pink-500 text-[10px] p-2 font-bold">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIw732tQkUIeaYXAUAg_80kSH63BytVtE",
            authDomain: "mimi-s-website-c91fa.firebaseapp.com",
            databaseURL: "https://mimi-s-website-c91fa-default-rtdb.firebaseio.com",
            projectId: "mimi-s-website-c91fa",
            storageBucket: "mimi-s-website-c91fa.firebasestorage.app",
            messagingSenderId: "761353241386",
            appId: "1:761353241386:web:b5596befd6eb3dae699453"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Persistent Chat ID
        let chatId = localStorage.getItem('mimi_chat_v2') || 'user_' + Math.floor(Math.random()*100000);
        localStorage.setItem('mimi_chat_v2', chatId);

        window.sendMsg = () => {
            const i = document.getElementById('chatInput'); if(!i.value) return;
            push(ref(db, 'chats/'+chatId), { sender:'client', text: i.value });
            i.value = '';
        };

        onValue(ref(db, 'chats/'+chatId), (s) => {
            const box = document.getElementById('messages'); box.innerHTML = '';
            s.forEach(m => { const d = m.val(); box.innerHTML += `<div class="${d.sender}">${d.text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });

        onValue(ref(db, 'mimiConfig'), (s) => {
            const d = s.val(); if(!d) return;
            document.getElementById('artistName').innerText = d.artistName;
            document.getElementById('discordLink').href = d.discord;
            document.getElementById('paypalLink').href = `https://paypal.me/${d.paypal}`;
            
            const grid = document.getElementById('priceGrid'); grid.innerHTML = '';
            d.styles.split(';;').forEach(x => {
                const [c, n, p] = x.split('|');
                grid.innerHTML += `<div class="art-card"><h3 class="font-bold uppercase italic">${n}</h3><p class="text-pink-500 font-bold mt-2">€${p}</p></div>`;
            });
        });
    </script>
</body>
</html>
