<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimi | Art Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .nav-link { font-size: 10px; font-weight: 900; color: #444; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .nav-link.active { color: #ec4899; }
        .art-card { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 30px; border-radius: 32px; transition: 0.4s; }
        
        /* Chat UI */
        #chat-window { position: fixed; bottom: -500px; right: 20px; width: 350px; height: 450px; background: #111; border: 1px solid #333; border-radius: 20px 20px 0 0; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; display: flex; flex-direction: column; }
        #chat-window.open { bottom: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 13px; line-height: 1.4; }
        .msg.client { align-self: flex-end; background: #ec4899; border-bottom-right-radius: 4px; }
        .msg.melly { align-self: flex-start; background: #222; border: 1px solid #333; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <h1 id="artistName" class="text-2xl font-black italic uppercase tracking-tighter text-pink-500">MIMI</h1>
        <div class="flex gap-6">
            <span onclick="filter('PixelArt')" id="btn-PixelArt" class="nav-link active">Pixel Art</span>
            <span onclick="filter('DigitalArt')" id="btn-DigitalArt" class="nav-link">Digital Art</span>
            <span onclick="filter('Renders')" id="btn-Renders" class="nav-link">Renders</span>
            <span onclick="filter('Skins')" id="btn-Skins" class="nav-link">Skins</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-10">
        <div id="priceGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <div id="chat-window">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900 rounded-t-20">
            <span class="font-bold text-[10px] uppercase tracking-widest text-pink-500">Live Inquiry</span>
            <button onclick="document.getElementById('chat-window').classList.remove('open')" class="text-zinc-500">✕</button>
        </div>
        <div id="messages"></div>
        <div class="p-3 border-t border-zinc-800 flex gap-2">
            <input type="text" id="chatInput" placeholder="Message Melly..." class="bg-black border border-zinc-800 rounded-lg p-2 flex-1 text-sm outline-none">
            <button onclick="sendMsg()" class="bg-pink-500 px-4 py-2 rounded-lg text-xs font-bold">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIw732tQkUIeaYXAUAg_80kSH63BytVtE",
            authDomain: "mimi-s-website-c91fa.firebaseapp.com",
            databaseURL: "https://mimi-s-website-c91fa-default-rtdb.firebaseio.com",
            projectId: "mimi-s-website-c91fa",
            storageBucket: "mimi-s-website-c91fa.firebasestorage.app",
            messagingSenderId: "761353241386",
            appId: "1:761353241386:web:b5596befd6eb3dae699453"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Persistent Chat ID
        let chatId = localStorage.getItem('mimi_chat_id');
        if(!chatId) {
            chatId = 'client_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('mimi_chat_id', chatId);
        }

        window.toggleChat = (name) => {
            document.getElementById('chat-window').classList.add('open');
            if(name) document.getElementById('chatInput').value = `I'm interested in ${name}! `;
        };

        window.sendMsg = () => {
            const input = document.getElementById('chatInput');
            if(!input.value) return;
            push(ref(db, 'chats/' + chatId), { sender: 'client', text: input.value, timestamp: Date.now() });
            input.value = '';
        };

        // Load and Save History
        onValue(ref(db, 'chats/' + chatId), (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            snap.forEach(msg => {
                const data = msg.val();
                box.innerHTML += `<div class="msg ${data.sender}">${data.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // Config loader logic
        onValue(ref(db, 'mimiConfig'), (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('artistName').innerText = d.artistName || 'MIMI';
            const styles = d.styles ? d.styles.split(';;') : [];
            const grid = document.getElementById('priceGrid');
            grid.innerHTML = '';
            styles.forEach(s => {
                const [cat, name, price] = s.split('|');
                grid.innerHTML += `
                    <div class="art-card">
                        <h3 class="text-xl font-black uppercase italic mb-4">${name}</h3>
                        <p class="text-pink-500 font-bold mb-6">€${price}</p>
                        <button onclick="toggleChat('${name}')" class="w-full border border-pink-500 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-pink-500 hover:text-white transition">Discuss Project</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
