<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimi | Art Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .art-card { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 25px; border-radius: 24px; transition: 0.3s; }
        .art-card:hover { border-color: #ec4899; }
        
        /* Chat UI - Bottom Left */
        #chat-ui { position: fixed; bottom: 80px; left: 20px; width: 320px; background: #111; border: 1px solid #333; border-radius: 20px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        #messages { height: 350px; overflow-y: auto; padding: 15px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
        .melly { align-self: flex-start; background: #222; padding: 8px 12px; border-radius: 15px 15px 15px 4px; border: 1px solid #333; }
        .client { align-self: flex-end; background: #ec4899; padding: 8px 12px; border-radius: 15px 15px 4px 15px; }
        
        /* Floating Buttons */
        .float-btn { position: fixed; bottom: 20px; font-weight: 900; font-size: 11px; padding: 12px 20px; border-radius: 50px; text-transform: uppercase; transition: 0.3s; z-index: 90; }
        .float-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <h1 id="artistName" class="text-3xl font-black italic uppercase text-pink-500">Mimi</h1>
        <a id="discordLink" href="#" target="_blank" class="bg-[#5865F2] px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest">Discord</a>
    </nav>

    <div class="flex gap-10 justify-center mb-10 text-[10px] font-bold uppercase tracking-widest text-zinc-500">
        <span onclick="filter('PixelArt')" class="cursor-pointer hover:text-pink-500">Pixel Art</span>
        <span onclick="filter('DigitalArt')" class="cursor-pointer hover:text-pink-500">Digital Art</span>
        <span onclick="filter('Renders')" class="cursor-pointer hover:text-pink-500">Renders</span>
        <span onclick="filter('Skins')" class="cursor-pointer hover:text-pink-500">Skins</span>
    </div>

    <main id="priceGrid" class="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-3 gap-8 pb-32"></main>

    <button onclick="document.getElementById('chat-ui').style.display='flex'" class="float-btn left-5 bg-pink-500">💬 Chat with Mimi</button>
    <a id="paypalLink" href="#" target="_blank" class="float-btn right-5 bg-[#0070ba]">💳 Pay via PayPal</a>

    <div id="chat-ui">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center text-[10px] font-black tracking-widest bg-zinc-900 rounded-t-20">
            <span>LIVE CHAT</span>
            <button onclick="this.parentElement.parentElement.style.display='none'" class="text-zinc-500">✕</button>
        </div>
        <div id="messages"></div>
        <div class="p-3 border-t border-zinc-800 flex gap-2">
            <input type="text" id="chatInput" placeholder="Ask a question..." class="bg-black text-sm p-2 flex-1 outline-none border border-zinc-800 rounded-lg">
            <button onclick="sendMsg()" class="bg-pink-500 text-xs px-4 py-2 font-bold rounded-lg">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIw732tQkUIeaYXAUAg_80kSH63BytVtE",
            authDomain: "mimi-s-website-c91fa.firebaseapp.com",
            databaseURL: "https://mimi-s-website-c91fa-default-rtdb.firebaseio.com",
            projectId: "mimi-s-website-c91fa",
            storageBucket: "mimi-s-website-c91fa.firebasestorage.app",
            messagingSenderId: "761353241386",
            appId: "1:761353241386:web:b5596befd6eb3dae699453"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // PERSISTENT CHAT: This makes sure messages stay saved for the user
        let chatId = localStorage.getItem('mimi_user_id');
        if(!chatId) {
            chatId = 'client_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('mimi_user_id', chatId);
        }

        window.sendMsg = () => {
            const input = document.getElementById('chatInput');
            if(!input.value) return;
            push(ref(db, 'chats/' + chatId), { sender: 'client', text: input.value });
            input.value = '';
        };

        onValue(ref(db, 'chats/' + chatId), (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            snap.forEach(m => {
                const data = m.val();
                box.innerHTML += `<div class="${data.sender}">${data.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // LOAD STORE DATA
        onValue(ref(db, 'mimiConfig'), (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('artistName').innerText = d.artistName || 'MIMI';
            document.getElementById('discordLink').href = d.discord || '#';
            document.getElementById('paypalLink').href = d.paypal ? `https://paypal.me/${d.paypal}` : '#';
            
            window.filter = (cat) => {
                const grid = document.getElementById('priceGrid');
                grid.innerHTML = '';
                if(d.styles) d.styles.split(';;').forEach(item => {
                    const [c, n, p] = item.split('|');
                    if(c === cat) {
                        grid.innerHTML += `<div class="art-card">
                            <h3 class="text-xl font-bold uppercase italic">${n}</h3>
                            <p class="text-pink-500 font-bold mt-4">€${p}</p>
                            <button onclick="document.getElementById('chat-ui').style.display='flex'; document.getElementById('chatInput').value='I want to talk about ${n}! '" class="mt-6 w-full py-2 border border-zinc-800 rounded-lg text-[10px] font-bold uppercase hover:bg-white hover:text-black transition">Discuss</button>
                        </div>`;
                    }
                });
            };
            filter('PixelArt'); // Default View
        });
    </script>
</body>
</html>
