<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimi | Art Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 280px; background: #0c0c0c; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        #main-content { flex: 1; overflow-y: auto; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
        .melly { align-self: flex-start; background: #222; padding: 8px 12px; border-radius: 12px; border: 1px solid #333; max-width: 80%; }
        .client { align-self: flex-end; background: #ec4899; padding: 8px 12px; border-radius: 12px; max-width: 80%; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; border: 1px solid #444; }
        .file-link { color: #38bdf8; text-decoration: underline; font-weight: bold; display: block; margin-top: 5px; }
        .nav-btn { width: 100%; text-align: left; padding: 12px 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #555; }
        .nav-btn.active { color: white; border-left: 3px solid #ec4899; background: #111; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="p-6 border-b border-zinc-800"><h1 class="text-xl font-black text-pink-500 italic">MIMI</h1></div>
        <div class="flex-1 pt-4 overflow-y-auto">
            <button onclick="showPage('gallery')" id="btn-gallery" class="nav-btn active">Gallery</button>
            <div id="user-chat-menu" class="hidden">
                <div class="px-5 py-3 flex justify-between items-center">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase">Chats</span>
                    <button onclick="createNewChat()" class="text-pink-500 text-[10px] font-bold">+ NEW</button>
                </div>
                <div id="chat-list"></div>
            </div>
        </div>
        <div class="p-4 border-t border-zinc-800">
            <button id="authBtn" onclick="handleAuth()" class="w-full py-2 bg-zinc-900 rounded-lg text-[10px] font-black uppercase">Loading...</button>
        </div>
    </div>

    <div id="main-content">
        <div id="gallery-page" class="p-8 max-w-6xl mx-auto">
            <div id="priceGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
        <div id="chat-page" class="hidden h-full flex flex-col max-w-4xl mx-auto bg-[#080808]">
            <div id="messages"></div>
            <div class="p-4 border-t border-zinc-800 flex flex-col gap-2">
                <div class="flex gap-2 items-center">
                    <button onclick="document.getElementById('fileIn').click()" class="bg-zinc-800 p-3 rounded-xl hover:bg-zinc-700">📎</button>
                    <input type="file" id="fileIn" class="hidden" onchange="uploadFile(this)">
                    <input type="text" id="chatInput" placeholder="Message..." class="flex-1 bg-black border border-zinc-800 p-3 rounded-xl outline-none">
                    <button onclick="sendMsg()" class="bg-pink-500 px-6 py-3 rounded-xl font-bold uppercase text-xs">Send</button>
                </div>
                <div id="uploadStatus" class="text-[10px] text-zinc-500 italic hidden">Uploading file...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIw732tQkUIeaYXAUAg_80kSH63BytVtE",
            authDomain: "mimi-s-website-c91fa.firebaseapp.com",
            databaseURL: "https://mimi-s-website-c91fa-default-rtdb.firebaseio.com",
            projectId: "mimi-s-website-c91fa",
            storageBucket: "mimi-s-website-c91fa.firebasestorage.app",
            messagingSenderId: "761353241386",
            appId: "1:761353241386:web:b5596befd6eb3dae699453"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let activeChatId = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if(user) {
                document.getElementById('user-chat-menu').classList.remove('hidden');
                document.getElementById('authBtn').innerText = "LOGOUT (" + user.displayName.split(' ')[0] + ")";
                syncChatList();
            } else {
                document.getElementById('user-chat-menu').classList.add('hidden');
                document.getElementById('authBtn').innerText = "LOGIN WITH GOOGLE";
                showPage('gallery');
            }
        });

        window.handleAuth = () => {
            if(currentUser) signOut(auth);
            else setPersistence(auth, browserLocalPersistence).then(() => signInWithPopup(auth, provider));
        };

        window.showPage = (p, chatId = null) => {
            document.getElementById('gallery-page').classList.toggle('hidden', p !== 'gallery');
            document.getElementById('chat-page').classList.toggle('hidden', p !== 'chat');
            document.getElementById('btn-gallery').classList.toggle('active', p === 'gallery');
            if(chatId) { activeChatId = chatId; loadChat(chatId); }
        };

        window.createNewChat = async () => {
            if(!currentUser) return;
            const safeEmail = currentUser.email.replace(/\./g, '_');
            const snap = await get(ref(db, `userIndex/${safeEmail}`));
            let count = (snap.val() || 0) + 1;
            await set(ref(db, `userIndex/${safeEmail}`), count);
            const newId = `${safeEmail}_chat_${count}`;
            push(ref(db, 'chats/' + newId), { sender: 'client', text: 'Chat Created', type: 'text', name: currentUser.displayName });
            showPage('chat', newId);
        };

        function syncChatList() {
            const safeEmail = currentUser.email.replace(/\./g, '_');
            onValue(ref(db, 'chats'), (snap) => {
                const list = document.getElementById('chat-list');
                list.innerHTML = '';
                snap.forEach(chat => {
                    if(chat.key.startsWith(safeEmail)) {
                        const b = document.createElement('button');
                        b.className = `nav-btn ${activeChatId === chat.key ? 'active' : ''}`;
                        b.innerText = 'Chat #' + chat.key.split('_').pop();
                        b.onclick = () => showPage('chat', chat.key);
                        list.appendChild(b);
                    }
                });
            });
        }

        window.uploadFile = async (el) => {
            const file = el.files[0];
            if(!file || !activeChatId) return;
            document.getElementById('uploadStatus').classList.remove('hidden');
            const fileRef = sRef(storage, `chats/${activeChatId}/${Date.now()}_${file.name}`);
            try {
                const snap = await uploadBytes(fileRef, file);
                const url = await getDownloadURL(snap.ref);
                const isImg = file.type.startsWith('image/');
                push(ref(db, 'chats/' + activeChatId), { 
                    sender: 'client', text: url, fileName: file.name, type: isImg ? 'image' : 'file', name: currentUser.displayName 
                });
            } catch(e) { console.error(e); }
            document.getElementById('uploadStatus').classList.add('hidden');
        };

        window.sendMsg = () => {
            const input = document.getElementById('chatInput');
            if(!input.value || !activeChatId) return;
            push(ref(db, 'chats/' + activeChatId), { sender: 'client', text: input.value, type: 'text', name: currentUser.displayName });
            input.value = '';
        };

        function loadChat(chatId) {
            onValue(ref(db, 'chats/' + chatId), (snap) => {
                const box = document.getElementById('messages');
                box.innerHTML = '';
                snap.forEach(m => {
                    const d = m.val();
                    let content = d.text;
                    if(d.type === 'image') content = `<img src="${d.text}" class="chat-img" onclick="window.open('${d.text}')">`;
                    if(d.type === 'file') content = `📄 <a href="${d.text}" target="_blank" class="file-link">${d.fileName || 'Download File'}</a>`;
                    box.innerHTML += `<div class="${d.sender}">${content}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        onValue(ref(db, 'mimiConfig'), (snap) => {
            const d = snap.val(); if(!d || !d.styles) return;
            const grid = document.getElementById('priceGrid');
            grid.innerHTML = '';
            d.styles.split(';;').forEach(item => {
                const [c, n, p] = item.split('|');
                grid.innerHTML += `<div class="art-card"><h3 class="text-xl font-bold uppercase">${n}</h3><p class="text-pink-500 font-bold mt-4">€${p}</p><button onclick="currentUser ? (activeChatId ? showPage('chat', activeChatId) : createNewChat()) : handleAuth()" class="mt-6 w-full py-2 border border-zinc-800 rounded-lg text-[10px] font-bold uppercase">Discuss</button></div>`;
            });
        });
    </script>
</body>
</html>
